services:
  - type: web
    name: sentra-ai-soc
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20.20.0
      - key: DATA_DIR
        value: /opt/render/project/src/data
    disk:
      name: submissions
      mountPath: /opt/render/project/src/data
      sizeGB: 1
